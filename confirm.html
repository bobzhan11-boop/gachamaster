<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GachaMaster - Email Confirmed!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
    }
    .container {
      text-align: center;
      background: rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .emoji { font-size: 64px; margin-bottom: 16px; }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #a29bfe, #6c5ce7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .msg {
      font-size: 16px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 24px;
      line-height: 1.5;
    }
    .countdown {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 24px;
    }
    .countdown span {
      color: #a29bfe;
      font-weight: bold;
      font-size: 18px;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: #fff;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(108,92,231,0.4);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(108,92,231,0.6);
    }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6c5ce7, #a29bfe);
      border-radius: 2px;
      width: 0%;
      transition: width 1s linear;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="emoji">&#127881;</div>
    <h1>Email Confirmed!</h1>
    <p class="msg">Your GachaMaster account is ready.<br>Time to start collecting!</p>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <p class="countdown">Redirecting to game in <span id="timer">5</span> seconds...</p>
    <a class="btn" href="./index.html" id="playBtn">Play Now</a>
  </div>

  <script>
    // Pass the hash (contains access token) to the game page
    const hash = window.location.hash;
    const gameUrl = './index.html' + hash;
    document.getElementById('playBtn').href = gameUrl;

    let seconds = 5;
    const timerEl = document.getElementById('timer');
    const progressEl = document.getElementById('progressFill');

    // Start progress bar
    setTimeout(() => { progressEl.style.width = '100%'; progressEl.style.transition = 'width 5s linear'; }, 50);

    const interval = setInterval(() => {
      seconds--;
      timerEl.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(interval);
        window.location.href = gameUrl;
      }
    }, 1000);
  </script>
</body>
</html>
